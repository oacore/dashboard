name: Preview deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy as preview'
        required: true
        type: string

env:
  ACR_NAME: corecontainers
  IMAGE_NAME: preview-hello
  RESOURCE_GROUP: core-frontend
  AKS_CLUSTER_NAME: core-frontend-kubernetes-cluster
  PREVIEW_NAMESPACE: core-frontend-preview
  ORIGIN_IP: 74.177.197.180

jobs:
  preview:
    runs-on: ubuntu-24.04-arm
    environment: azure
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Compute names
        id: vars
        run: |
          RAW="${{ inputs.branch }}"
          SLUG=$(echo "$RAW" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/^-*//;s/-*$//' \
            | cut -c1-40 \
            | sed 's/-*$//')
          TAG=$(echo ${{ github.sha }} | cut -c1-7)
          DNS_NAME="preview-${SLUG}"
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "name=preview-$SLUG" >> $GITHUB_OUTPUT
          echo "dns_name=$DNS_NAME" >> $GITHUB_OUTPUT
          echo "host=$DNS_NAME.core.ac.uk" >> $GITHUB_OUTPUT
          echo "image=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:$SLUG-$TAG" >> $GITHUB_OUTPUT

      - name: Ensure Cloudflare DNS record
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          DNS_NAME: ${{ steps.vars.outputs.dns_name }}
          HOST: ${{ steps.vars.outputs.host }}
        run: |
          set -e

          LOOKUP=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=A&name=${HOST}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")

          EXISTING=$(echo "$LOOKUP" | jq -r '.result[0].id // empty')

          if [ -n "$EXISTING" ]; then
            echo "::notice::DNS record for $HOST already exists (id=$EXISTING)"
            exit 0
          fi

          echo "Creating DNS record for $HOST -> ${ORIGIN_IP}"
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"A\",\"name\":\"${DNS_NAME}\",\"content\":\"${ORIGIN_IP}\",\"proxied\":true,\"ttl\":1}")

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::DNS record creation failed"
            echo "$RESPONSE" | jq
            exit 1
          fi

          echo "::notice::DNS record created for $HOST"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Docker ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build and push
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -t ${{ steps.vars.outputs.image }} .

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --admin --overwrite-existing

      - name: Deploy preview
        run: |
          export NAME="${{ steps.vars.outputs.name }}"
          export IMAGE="${{ steps.vars.outputs.image }}"
          export HOST="${{ steps.vars.outputs.host }}"
          export BRANCH="${{ inputs.branch }}"
          envsubst < kube/preview.yml | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ steps.vars.outputs.name }} \
            -n ${{ env.PREVIEW_NAMESPACE }} \
            --timeout=300s

      - name: Output preview URL
        run: |
          echo "### 🚀 Preview deployed" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://${{ steps.vars.outputs.host }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ steps.vars.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY