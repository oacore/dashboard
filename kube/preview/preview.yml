apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${NAME}
  namespace: core-frontend-preview
  labels:
    app: ${NAME}
    preview: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${NAME}
  template:
    metadata:
      labels:
        app: ${NAME}
        preview: "true"
    spec:
      nodeSelector:
        agentpool: userpool
      containers:
        - name: app
          image: ${IMAGE}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: BRANCH_NAME
              value: ${BRANCH}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ${NAME}
  namespace: core-frontend-preview
spec:
  type: ClusterIP
  selector:
    app: ${NAME}
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${NAME}
  namespace: core-frontend-preview
  labels:
    preview: "true"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public-gateway
      namespace: gateway-system
  hostnames:
    - ${HOST}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ${NAME}
          port: 80
